repos:
  - repo: local
    hooks:
      - id: lint
        name: ruff lint
        entry: make lint
        language: system
        pass_filenames: false

      - id: test
        name: pytest
        entry: uv run python -m pytest tests/ -m "not e2e"
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
